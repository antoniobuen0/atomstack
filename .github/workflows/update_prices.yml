name: 🔄 Actualizar Precios de Materiales

on:
  # Ejecución diaria a las 7:00 AM UTC (9:00 AM Madrid hora peninsular)
  schedule:
    - cron: '0 7 * * *'
  # Ejecución manual desde GitHub Actions → "Run workflow"
  workflow_dispatch:
    inputs:
      reason:
        description: 'Motivo de la ejecución manual (opcional)'
        required: false
        default: 'Actualización manual de precios'

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repositorio
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: 🔍 Exportar shoppingData a JSON (via Node.js)
        run: |
          node -e "
          const fs = require('fs');
          let src = fs.readFileSync('shopping_data.js','utf8');
          src = src.replace('const shoppingData', 'global.shoppingData');
          eval(src);
          fs.writeFileSync('shopping_data_parsed.json', JSON.stringify(global.shoppingData, null, 2));
          console.log('Exported', Object.keys(global.shoppingData).length, 'materials');
          "

      - name: 🕷️ Ejecutar scraper de precios
        run: python update_prices_cron.py

      - name: 📊 Verificar resultados
        run: |
          echo "=== shopping_dataset_updated.json ==="
          wc -l shopping_dataset_updated.json || echo "No encontrado"
          echo "=== Primeras líneas de shopping_data.js actualizado ==="
          head -30 shopping_data.js

      - name: 💾 Commit y push de precios actualizados
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add shopping_data.js shopping_dataset_updated.json
          git diff --staged --quiet || git commit -m "🤖 Auto-update precios materiales láser [$(date +'%Y-%m-%d')]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
